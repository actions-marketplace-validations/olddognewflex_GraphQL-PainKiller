name: GraphQL Painkiller PR Review

on:
  pull_request:
    paths:
      - '**/*.graphql'
      - '**/*.gql'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Run GraphQL Painkiller
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config-path: 'gql-painkiller.config.yaml'
          analyze-path: '.'
          fail-on: 'none'
